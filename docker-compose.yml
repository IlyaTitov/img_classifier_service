services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-img_classifier}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Backend ─────────────────────────────────────────────────────────────────

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-img_classifier}
      CELERY_BROKER_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-/app/weights/yolov8s.pt}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      CORS_ORIGINS: http://localhost,http://localhost:80
    volumes:
      - uploads:/app/uploads
      - weights:/app/weights
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery worker ───────────────────────────────────────────────────────────

  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    command: >
      sh -c "cd /app/src &&
             celery -A celery_app worker
             --loglevel=info
             --concurrency=2
             -Q celery"
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-img_classifier}
      CELERY_BROKER_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      YOLO_MODEL_PATH: ${YOLO_MODEL_PATH:-/app/weights/yolov8s.pt}
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      PYTHONPATH: /app/src
    volumes:
      - uploads:/app/uploads
      - weights:/app/weights
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend ────────────────────────────────────────────────────────────────

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend

  # ── Load testing (optional, run manually) ───────────────────────────────────

  locust:
    build:
      context: ./load_test
      dockerfile: Dockerfile
    profiles:
      - loadtest
    ports:
      - "8089:8089"
    command: >
      locust -f locustfile.py
      --host=http://backend:8000
      --web-host=0.0.0.0
    volumes:
      - ./load_test:/mnt/locust
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  uploads:
  weights:
